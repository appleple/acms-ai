# 依存を最新に保つ。minor/patch は group ごとに 1 本の PR にまとめ、CI 通過後に
# .github/workflows/dependabot-auto-merge.yml が自動マージする（ワークフローは ecosystem 非依存＝update-type 判定）。
# major は方針として Dependabot では受け取らない（自分で上げる）。各 ecosystem で semver-major を ignore する。
version: 2
updates:
  # ワークフローが使う GitHub Actions。
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # major は自分で上げるため受け取らない。
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # 管理画面 UI（React/TypeScript）の npm 依存。パッケージマネージャは pnpm（pnpm-lock.yaml を検出）。
  # minor/patch は 1 本にまとめて自動マージ。major（react / vite / vitest / typescript 等）は受け取らない。
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # major は自分で上げるため受け取らない。
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # PHP の開発依存（PHPStan / PHPUnit / phpcs / phpcompatibility 等）。composer.lock をコミットしているため
  # ロック更新が届く。配布物（app/ の zip）には含まれない dev ツールで影響は CI/ローカルのみ、かつ CI で
  # 検証されるため minor/patch は 1 本にまとめて自動マージ。major（phpcs 4.x 等）は受け取らない。
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      composer:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # major は自分で上げるため受け取らない。
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # テスト基盤は検証対象の a-blog cms マイナー（現状 3.2）に手動で合わせるため minor も止める
      # （3.3 以降への昇格は CI マトリクス acms 3.2 とずれるため。3.2.x のパッチ更新だけ通す）。
      - dependency-name: "ablogcms/testing-framework"
        update-types: ["version-update:semver-minor"]
